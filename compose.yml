services:
  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432" # host:container
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - shared-net
      
  redis:
    image: redis:7.4.1
    container_name: redis
    restart: always
    command: redis-server --requirepass admin --port 6379
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - shared-net  

volumes:
  pgdata:
  redis-data:

networks:
  shared-net:
    name: shared-net

